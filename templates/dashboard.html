<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockTrading Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', 'Menlo', monospace;
  background: #0a0a0a;
  color: #d4d4d4;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: #141414;
  border-bottom: 1px solid #252525;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.logo { font-size: 16px; font-weight: bold; color: #fff; letter-spacing: -0.5px; }
.dot {
  width: 9px; height: 9px; border-radius: 50%;
  flex-shrink: 0; display: inline-block;
}
.dot.on  { background: #22c55e; box-shadow: 0 0 7px #22c55e88; }
.dot.off { background: #444; }
.mode-grp {
  display: flex; align-items: center; gap: 5px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  padding: 3px 10px; border-radius: 5px;
}
.mode-lbl { font-size: 11px; font-weight: bold; color: #888; }
.mode-lbl.mock-lbl { color: #a78bfa; }
.mode-lbl.real-lbl { color: #4ade80; }
.pid  { font-size: 10px; color: #444; }
.ts   { font-size: 11px; color: #444; }

/* ── Bot control buttons ── */
.bot-controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn-bot {
  padding: 5px 14px; border-radius: 5px; font-size: 12px; font-weight: bold;
  font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s;
}
.btn-bot:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-start { background: #15803d; color: #fff; }
.btn-start:hover:not(:disabled) { background: #16a34a; }
.btn-stop  { background: #b91c1c; color: #fff; }
.btn-stop:hover:not(:disabled)  { background: #dc2626; }
.btn-deploy { background: #1d4ed8; color: #fff; }
.btn-deploy:hover:not(:disabled) { background: #2563eb; }
.btn-spin::after { content: ' …'; }

/* ── Stats bar ── */
.stats {
  background: #0f0f0f;
  border-bottom: 1px solid #1e1e1e;
  padding: 7px 18px;
  display: flex;
  gap: 28px;
  flex-shrink: 0;
  align-items: center;
}
.stat { display: flex; flex-direction: column; }
.stat-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; }
.stat-val { font-size: 20px; font-weight: bold; line-height: 1.2; }
.stat-val.t { color: #60a5fa; }
.stat-val.b { color: #22c55e; }
.stat-val.s { color: #ef4444; }
#statSignals { font-size: 12px; color: #888; margin-top: 2px; }

/* ── Layout ── */
.body {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 1px;
  background: #1e1e1e;
}
.pane {
  display: flex;
  flex-direction: column;
  background: #0a0a0a;
  overflow: hidden;
}
.pane-left  { width: 54%; }
.pane-right { flex: 1; }

/* ── Log tabs ── */
.log-tabs { display: flex; gap: 0; }
.log-tab {
  padding: 6px 16px; font-size: 11px; font-weight: bold;
  font-family: inherit; cursor: pointer; border: none;
  background: #0f0f0f; color: #555;
  border-bottom: 2px solid transparent;
  transition: color 0.15s;
}
.log-tab:hover { color: #aaa; }
.log-tab.active { color: #e0e0e0; border-bottom-color: #3b82f6; background: #141414; }
.log-tab .tab-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; background: #333;
}
.log-tab.mock-active .tab-dot { background: #a78bfa; }
.log-tab.real-active .tab-dot { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }

.pane-hd {
  background: #141414;
  padding: 7px 14px;
  font-size: 11px;
  font-weight: bold;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-bottom: 1px solid #1e1e1e;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.btn-sm {
  font-size: 11px; cursor: pointer;
  color: #3b82f6; background: none; border: none;
  font-family: inherit;
}
.btn-sm:hover { color: #60a5fa; }

/* ── Log viewer ── */
.log-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
  font-size: 11.5px;
  line-height: 1.65;
}
.ll { padding: 0; white-space: pre-wrap; word-break: break-all; }
.ll.INFO    { color: #c9c9c9; }
.ll.WARNING { color: #fbbf24; }
.ll.ERROR   { color: #f87171; }
.ll.DEBUG   { color: #4b5563; }
.ll .ts2    { color: #3f3f3f; }
.ll .kw-b   { color: #4ade80; font-weight: bold; }
.ll .kw-s   { color: #f87171; font-weight: bold; }

/* ── Trade table ── */
.tbl-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead th {
  background: #111;
  padding: 7px 9px;
  text-align: left;
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid #141414; }
tbody tr:hover { background: #111; }
td { padding: 6px 9px; color: #bbb; vertical-align: middle; }
.ab { color: #22c55e; font-weight: bold; }
.as { color: #ef4444; font-weight: bold; }
.sig {
  display: inline-block; padding: 1px 5px;
  border-radius: 3px; font-size: 10px; white-space: nowrap;
}
.sg-gc  { background: #14291e; color: #4ade80; }
.sg-sl  { background: #2d1414; color: #f87171; }
.sg-tp  { background: #14213d; color: #60a5fa; }
.sg-dc  { background: #2d2414; color: #fbbf24; }
.sg-def { background: #1e1e1e; color: #888; }
code { color: #60a5fa; font-size: 11px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

/* ── Mobile ── */
@media (max-width: 768px) {
  body { height: auto; overflow: auto; }

  header {
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px;
  }
  .logo { font-size: 14px; }
  .bot-controls { margin-left: 0; width: 100%; justify-content: flex-end; }
  .btn-bot { padding: 6px 12px; font-size: 11px; }
  #lastTs { display: none; }

  .stats {
    gap: 14px;
    padding: 6px 12px;
    flex-wrap: wrap;
  }
  .stat-val { font-size: 16px; }
  #statSignals { font-size: 10px; }

  .body {
    flex-direction: column;
    height: auto;
    overflow: visible;
    background: #0a0a0a;
  }
  .pane-left  { width: 100%; height: 260px; flex-shrink: 0; }
  .pane-right { flex: none; height: auto; min-height: 300px; }

  .tbl-wrap { overflow-x: auto; overflow-y: auto; max-height: 50vh; }
  table { font-size: 11px; min-width: 480px; }
  thead th { padding: 6px 6px; }
  td { padding: 5px 6px; }
}
</style>
</head>
<body>

<header>
  <span class="logo">📈 StockTrading</span>
  <span class="mode-grp">
    <span class="dot off" id="dotMock"></span>
    <span class="mode-lbl mock-lbl">MOCK</span>
    <span class="pid" id="pidMock"></span>
  </span>
  <span class="mode-grp">
    <span class="dot off" id="dotReal"></span>
    <span class="mode-lbl real-lbl">REAL</span>
    <span class="pid" id="pidReal"></span>
  </span>
  <div class="bot-controls">
    <button class="btn-bot btn-deploy" id="btnDeploy" onclick="botDeploy()">🚀 배포</button>
    <button class="btn-bot btn-start" id="btnStart" onclick="botStart()">▶ 시작</button>
    <button class="btn-bot btn-stop"  id="btnStop"  onclick="botStop()">■ 정지</button>
  </div>
  <span class="ts" id="lastTs" style="margin-left:8px"></span>
</header>

<div class="stats">
  <div class="stat">
    <span class="stat-lbl">전체</span>
    <span class="stat-val t" id="stTotal">—</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">매수</span>
    <span class="stat-val b" id="stBuys">—</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">매도</span>
    <span class="stat-val s" id="stSells">—</span>
  </div>
  <div class="stat" style="flex:1">
    <span class="stat-lbl">신호 분포</span>
    <span id="statSignals">—</span>
  </div>
  <div>
    <select id="modeSelect" onchange="onModeChange(this.value)"
      style="background:#1a1a1a;color:#aaa;border:1px solid #333;
             padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px;cursor:pointer">
      <option value="mock">Mock</option>
      <option value="real">Real</option>
    </select>
  </div>
</div>

<div class="body">
  <!-- 로그 패널 -->
  <div class="pane pane-left">
    <div class="pane-hd" style="padding: 0 14px 0 0;">
      <div class="log-tabs">
        <button class="log-tab active mock-active" id="tabMock" onclick="switchLogTab('mock')">
          <span class="tab-dot"></span>MOCK
        </button>
        <button class="log-tab" id="tabReal" onclick="switchLogTab('real')">
          <span class="tab-dot"></span>REAL
        </button>
      </div>
      <button class="btn-sm" id="asBtn" onclick="toggleAS()" style="margin-left: auto; padding-right: 4px;">자동스크롤 ON</button>
    </div>
    <div class="log-wrap" id="logMock"></div>
    <div class="log-wrap" id="logReal" style="display:none"></div>
  </div>

  <!-- 거래 패널 -->
  <div class="pane pane-right">
    <div class="pane-hd">
      <span>💼 거래 내역</span>
      <button class="btn-sm" onclick="loadTrades()">새로고침</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>시각</th>
            <th>구분</th>
            <th>종목</th>
            <th>수량</th>
            <th>체결가</th>
            <th>신호</th>
          </tr>
        </thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let autoScroll  = true;
let activeLogTab = 'mock';
let currentMode  = 'mock';   // 거래내역 탭 모드
let spinning     = { mock: false, real: false };
let botStatus    = { mock: { running: false, pid: null }, real: { running: false, pid: null } };

// ── 자동스크롤 ─────────────────────────────────────
function toggleAS() {
  autoScroll = !autoScroll;
  document.getElementById('asBtn').textContent = '자동스크롤 ' + (autoScroll ? 'ON' : 'OFF');
}

// ── 거래내역 모드 전환 ──────────────────────────────
function onModeChange(v) {
  currentMode = v;
  loadTrades();
  loadSummary();
}

// ── 버튼 상태 (현재 활성 탭 기준) ──────────────────
function setButtons() {
  const m  = activeLogTab;
  const run = botStatus[m].running;
  const sp  = spinning[m];
  const bs = document.getElementById('btnStart');
  const bx = document.getElementById('btnStop');
  const bd = document.getElementById('btnDeploy');
  bs.disabled = run || sp;
  bx.disabled = !run || sp;
  bd.disabled = sp;
  bs.classList.toggle('btn-spin', sp && !run);
  bx.classList.toggle('btn-spin', sp && run);
  bd.classList.toggle('btn-spin', sp);
  bd.textContent = sp ? '🚀 배포 중' : '🚀 배포';
}

// ── 봇 제어 (active tab 모드로) ────────────────────
function _post(url, mode) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode }),
  }).then(r => r.json());
}

function botStart() {
  const mode = activeLogTab;
  spinning[mode] = true; setButtons();
  appendLog(mode, `[대시보드] ${mode.toUpperCase()} 봇 시작 요청...`);
  _post('/api/bot/start', mode)
    .then(d => {
      appendLog(mode, d.ok ? `[대시보드] ${mode.toUpperCase()} 봇 시작됨 (PID ${d.pid})` : `[대시보드] 시작 실패: ${d.error||''}`);
      spinning[mode] = false; loadStatus();
    })
    .catch(e => { appendLog(mode, '오류: ' + e); spinning[mode] = false; setButtons(); });
}

function botStop() {
  const mode = activeLogTab;
  spinning[mode] = true; setButtons();
  appendLog(mode, `[대시보드] ${mode.toUpperCase()} 봇 정지 요청...`);
  _post('/api/bot/stop', mode)
    .then(d => {
      appendLog(mode, d.ok ? `[대시보드] ${mode.toUpperCase()} 봇 정지됨` : `[대시보드] 정지 실패: ${d.error||''}`);
      spinning[mode] = false; loadStatus();
    })
    .catch(e => { appendLog(mode, '오류: ' + e); spinning[mode] = false; setButtons(); });
}

function botDeploy() {
  const mode = activeLogTab;
  spinning[mode] = true; setButtons();
  appendLog(mode, '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  appendLog(mode, `[deploy] ${mode.toUpperCase()} — git pull → 재시작...`);
  _post('/api/bot/deploy', mode)
    .then(d => {
      (d.lines || []).forEach(l => appendLog(mode, l));
      appendLog(mode, d.ok ? `✅ ${mode.toUpperCase()} 배포 완료` : `❌ 배포 실패: ${d.error||''}`);
      appendLog(mode, '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      spinning[mode] = false; loadStatus(); loadTrades(); loadSummary();
    })
    .catch(e => { appendLog(mode, '오류: ' + e); spinning[mode] = false; setButtons(); });
}

// ── 상태 ──────────────────────────────────────────
function loadStatus() {
  fetch('/api/status').then(r => r.json()).then(d => {
    botStatus = d;
    ['mock','real'].forEach(m => {
      const on = d[m].running;
      const pid = d[m].pid;
      document.getElementById('dot' + m[0].toUpperCase() + m.slice(1)).className = 'dot ' + (on ? 'on' : 'off');
      document.getElementById('pid' + m[0].toUpperCase() + m.slice(1)).textContent = pid ? 'PID ' + pid : '';
      // 로그 탭 dot
      const tab = document.getElementById('tab' + m[0].toUpperCase() + m.slice(1));
      const dot = tab.querySelector('.tab-dot');
      if (m === 'mock') {
        dot.style.background  = on ? '#a78bfa' : '#333';
        dot.style.boxShadow   = on ? '0 0 5px #a78bfa88' : 'none';
      } else {
        dot.style.background  = on ? '#22c55e' : '#333';
        dot.style.boxShadow   = on ? '0 0 5px #22c55e88' : 'none';
      }
    });
    document.getElementById('lastTs').textContent = new Date().toLocaleTimeString('ko-KR');
    setButtons();
  }).catch(() => {});
}

// ── 통계 ──────────────────────────────────────────
function loadSummary() {
  fetch('/api/trades/summary?mode=' + currentMode).then(r => r.json()).then(d => {
    document.getElementById('stTotal').textContent = d.total;
    document.getElementById('stBuys').textContent  = d.buys;
    document.getElementById('stSells').textContent = d.sells;
    const sigs = Object.entries(d.by_signal)
      .sort((a,b) => b[1]-a[1])
      .map(([k,v]) => k+' '+v+'건').join('  ·  ');
    document.getElementById('statSignals').textContent = sigs || '—';
  }).catch(() => {});
}

// ── 거래내역 ───────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return String(d.getMonth()+1).padStart(2,'0') + '/' +
         String(d.getDate()).padStart(2,'0') + ' ' +
         String(d.getHours()).padStart(2,'0') + ':' +
         String(d.getMinutes()).padStart(2,'0');
}
function fmtPrice(p, code) {
  if (!p) return '—';
  const n = parseFloat(p);
  if (isNaN(n)) return p;
  return /^[A-Z]{1,5}$/.test(code) ? '$'+n.toFixed(2) : n.toLocaleString('ko-KR')+'원';
}
function sigClass(s) {
  if (!s) return 'sg-def';
  if (s.includes('골든')) return 'sg-gc';
  if (s.includes('손절')) return 'sg-sl';
  if (s.includes('익절')) return 'sg-tp';
  if (s.includes('데드')) return 'sg-dc';
  return 'sg-def';
}
function loadTrades() {
  fetch('/api/trades?mode=' + currentMode).then(r => r.json()).then(records => {
    const tb = document.getElementById('tBody');
    tb.innerHTML = '';
    records.forEach(r => {
      const isBuy = r.action === 'BUY';
      const nameMain = r.stock_name
        ? `<span style="font-size:13px;color:#e0e0e0;font-weight:bold">${r.stock_name}</span>`
        : `<span style="font-size:13px;color:#60a5fa;font-weight:bold">${r.stock_code}</span>`;
      const codeSub = r.stock_name ? `<br><span style="color:#444;font-size:10px">${r.stock_code}</span>` : '';
      const profit  = r.profit_rate_pct != null
        ? `<span style="color:${r.profit_rate_pct>=0?'#22c55e':'#ef4444'};font-size:10px;margin-left:4px">${r.profit_rate_pct>=0?'+':''}${r.profit_rate_pct.toFixed(2)}%</span>` : '';
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td style="color:#444">${fmtTime(r.timestamp)}</td>` +
        `<td class="${isBuy?'ab':'as'}">${isBuy?'▲':'▼'} ${r.action}</td>` +
        `<td>${nameMain}${codeSub}</td>` +
        `<td>${r.quantity}</td>` +
        `<td>${fmtPrice(r.exec_price, r.stock_code)}${profit}</td>` +
        `<td><span class="sig ${sigClass(r.signal_type)}">${r.signal_type||'—'}</span></td>`;
      tb.appendChild(tr);
    });
  }).catch(() => {});
}

// ── 로그 탭 ───────────────────────────────────────
function switchLogTab(mode) {
  activeLogTab = mode;
  document.getElementById('logMock').style.display = mode==='mock' ? '' : 'none';
  document.getElementById('logReal').style.display = mode==='real' ? '' : 'none';
  document.getElementById('tabMock').className = 'log-tab' + (mode==='mock' ? ' active mock-active' : '');
  document.getElementById('tabReal').className = 'log-tab' + (mode==='real' ? ' active real-active' : '');
  setButtons();
  if (autoScroll) {
    const w = document.getElementById(mode==='mock' ? 'logMock' : 'logReal');
    w.scrollTop = w.scrollHeight;
  }
}

function appendLog(mode, line) {
  const wrap = document.getElementById(mode==='mock' ? 'logMock' : 'logReal');
  const d = document.createElement('div');
  d.className = 'll';
  let lvl = 'INFO';
  if (line.includes('[ERROR]')) lvl = 'ERROR';
  else if (line.includes('[WARNING]') || line.includes('[WARN]')) lvl = 'WARNING';
  else if (line.includes('[DEBUG]')) lvl = 'DEBUG';
  d.classList.add(lvl);
  d.innerHTML = line
    .replace(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+)/, '<span class="ts2">$1</span>')
    .replace(/(매수 완료|체결 완료|골든크로스|BUY)/g, '<span class="kw-b">$1</span>')
    .replace(/(매도 완료|손절 매도|익절 매도|SELL)/g, '<span class="kw-s">$1</span>');
  wrap.appendChild(d);
  while (wrap.children.length > 600) wrap.removeChild(wrap.firstChild);
  if (autoScroll && activeLogTab === mode) wrap.scrollTop = wrap.scrollHeight;
}

function makeEventSource(mode) {
  const es = new EventSource(`/stream/logs?mode=${mode}`);
  es.onmessage = e => { try { appendLog(mode, JSON.parse(e.data)); } catch(_) {} };
  es.onerror   = () => appendLog(mode, `[${mode.toUpperCase()}] 스트림 연결 끊김 — 재연결 중...`);
}

// ── Init ──────────────────────────────────────────
makeEventSource('mock');
makeEventSource('real');
loadStatus();
loadTrades();
loadSummary();
setInterval(loadStatus,  5000);
setInterval(loadTrades,  30000);
setInterval(loadSummary, 30000);
</script>
</body>
</html>
