<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockTrading Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', 'Menlo', monospace;
  background: #0a0a0a;
  color: #d4d4d4;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: #141414;
  border-bottom: 1px solid #252525;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.logo { font-size: 16px; font-weight: bold; color: #fff; letter-spacing: -0.5px; }
.dot {
  width: 9px; height: 9px; border-radius: 50%;
  flex-shrink: 0; display: inline-block;
}
.dot.on  { background: #22c55e; box-shadow: 0 0 7px #22c55e88; }
.dot.off { background: #444; }
.mode-grp {
  display: flex; align-items: center; gap: 5px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  padding: 3px 10px; border-radius: 5px;
}
.mode-lbl { font-size: 11px; font-weight: bold; color: #888; }
.mode-lbl.mock-lbl { color: #a78bfa; }
.mode-lbl.real-lbl { color: #4ade80; }
.pid  { font-size: 10px; color: #444; }
.ts   { font-size: 11px; color: #444; }

/* ── Bot control buttons ── */
.bot-controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn-bot {
  padding: 5px 14px; border-radius: 5px; font-size: 12px; font-weight: bold;
  font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s;
}
.btn-bot:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-start { background: #15803d; color: #fff; }
.btn-start:hover:not(:disabled) { background: #16a34a; }
.btn-stop  { background: #b91c1c; color: #fff; }
.btn-stop:hover:not(:disabled)  { background: #dc2626; }
.btn-deploy { background: #1d4ed8; color: #fff; }
.btn-deploy:hover:not(:disabled) { background: #2563eb; }
.btn-spin::after { content: ' …'; }
.mode-grp .btn-bot { padding: 2px 7px; font-size: 11px; }

/* ── Stats bar ── */
.stats {
  background: #0f0f0f;
  border-bottom: 1px solid #1e1e1e;
  padding: 7px 18px;
  display: flex;
  gap: 28px;
  flex-shrink: 0;
  align-items: center;
}
.stat { display: flex; flex-direction: column; }
.stat-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; }
.stat-val { font-size: 20px; font-weight: bold; line-height: 1.2; }
.stat-val.t { color: #60a5fa; }
.stat-val.b { color: #22c55e; }
.stat-val.s { color: #ef4444; }
#statSignals { font-size: 12px; color: #888; margin-top: 2px; }

/* ── Layout ── */
.body {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 1px;
  background: #1e1e1e;
}
.pane {
  display: flex;
  flex-direction: column;
  background: #0a0a0a;
  overflow: hidden;
}
.pane-left  { width: 54%; }
.pane-right { flex: 1; }

/* ── Log tabs ── */
.log-tabs { display: flex; gap: 0; }
.log-tab {
  padding: 6px 16px; font-size: 11px; font-weight: bold;
  font-family: inherit; cursor: pointer; border: none;
  background: #0f0f0f; color: #555;
  border-bottom: 2px solid transparent;
  transition: color 0.15s;
}
.log-tab:hover { color: #aaa; }
.log-tab.active { color: #e0e0e0; border-bottom-color: #3b82f6; background: #141414; }
.log-tab .tab-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; background: #333;
}
.log-tab.mock-active .tab-dot { background: #a78bfa; }
.log-tab.real-active .tab-dot { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }

.pane-hd {
  background: #141414;
  padding: 7px 14px;
  font-size: 11px;
  font-weight: bold;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-bottom: 1px solid #1e1e1e;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.btn-sm {
  font-size: 11px; cursor: pointer;
  color: #3b82f6; background: none; border: none;
  font-family: inherit;
}
.btn-sm:hover { color: #60a5fa; }

/* ── Log viewer ── */
.log-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
  font-size: 11.5px;
  line-height: 1.65;
}
.ll { padding: 0; white-space: pre-wrap; word-break: break-all; }
.ll.INFO    { color: #c9c9c9; }
.ll.WARNING { color: #fbbf24; }
.ll.ERROR   { color: #f87171; }
.ll.DEBUG   { color: #4b5563; }
.ll .ts2    { color: #3f3f3f; }
.ll .kw-b   { color: #4ade80; font-weight: bold; }
.ll .kw-s   { color: #f87171; font-weight: bold; }

/* ── Right pane tabs ── */
.right-tabs { display: flex; }
.right-tab {
  padding: 6px 14px; font-size: 11px; font-weight: bold;
  font-family: inherit; cursor: pointer; border: none;
  background: #0f0f0f; color: #555;
  border-bottom: 2px solid transparent;
  transition: color 0.15s;
}
.right-tab:hover { color: #aaa; }
.right-tab.active { color: #e0e0e0; border-bottom-color: #3b82f6; background: #141414; }

/* ── Settings panel ── */
.settings-wrap {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.cfg-section { display: flex; flex-direction: column; gap: 10px; }
.cfg-title {
  font-size: 10px; font-weight: bold; color: #555;
  text-transform: uppercase; letter-spacing: 0.8px;
  border-bottom: 1px solid #1e1e1e; padding-bottom: 6px;
}
.cfg-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cfg-input {
  width: 80px; padding: 5px 8px;
  background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
  color: #d4d4d4; font-family: inherit; font-size: 13px;
}
.cfg-input:focus { outline: none; border-color: #3b82f6; }
.cfg-select {
  padding: 5px 8px;
  background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
  color: #aaa; font-family: inherit; font-size: 12px; cursor: pointer;
}
.cfg-save {
  padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: bold;
  font-family: inherit; cursor: pointer; border: none;
  background: #1d4ed8; color: #fff;
}
.cfg-save:hover { background: #2563eb; }
.cfg-hint { font-size: 11px; color: #555; }
.cfg-hint span { color: #60a5fa; }
.cfg-msg { font-size: 11px; height: 16px; }
.cfg-msg.ok  { color: #22c55e; }
.cfg-msg.err { color: #ef4444; }

/* ── Trade table ── */
.tbl-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead th {
  background: #111;
  padding: 7px 9px;
  text-align: left;
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid #141414; }
tbody tr:hover { background: #111; }
td { padding: 6px 9px; color: #bbb; vertical-align: middle; }
.ab { color: #22c55e; font-weight: bold; }
.as { color: #ef4444; font-weight: bold; }
.sig {
  display: inline-block; padding: 1px 5px;
  border-radius: 3px; font-size: 10px; white-space: nowrap;
}
.sg-gc  { background: #14291e; color: #4ade80; }
.sg-sl  { background: #2d1414; color: #f87171; }
.sg-tp  { background: #14213d; color: #60a5fa; }
.sg-dc  { background: #2d2414; color: #fbbf24; }
.sg-def { background: #1e1e1e; color: #888; }
code { color: #60a5fa; font-size: 11px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

/* ── Mobile ── */
.mob-tabs { display: none; }

@media (max-width: 768px) {
  body { height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  header { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
  .logo { font-size: 14px; }
  .bot-controls { margin-left: 0; width: 100%; justify-content: flex-end; }
  .btn-bot { padding: 6px 12px; font-size: 11px; }
  #lastTs { display: none; }

  .stats { gap: 14px; padding: 6px 12px; flex-wrap: wrap; }
  .stat-val { font-size: 16px; }
  #statSignals { display: none; }

  .mob-tabs {
    display: flex;
    background: #141414;
    border-bottom: 1px solid #252525;
    flex-shrink: 0;
  }
  .mob-tab {
    flex: 1; padding: 10px; font-size: 12px; font-weight: bold;
    font-family: inherit; cursor: pointer; border: none;
    background: #141414; color: #555;
    border-bottom: 2px solid transparent;
  }
  .mob-tab.active { color: #e0e0e0; border-bottom-color: #3b82f6; background: #1a1a1a; }

  .body { flex: 1; flex-direction: column; overflow: hidden; background: #0a0a0a; }

  .pane-left .pane-hd,
  .pane-right .pane-hd { display: none; }

  /* 기본: 로그만 표시, 거래내역/설정 완전 숨김 */
  .pane-left  { display: flex !important; width: 100%; flex: 1; }
  .pane-right { display: none !important; width: 100%; flex: 1; }

  /* 거래내역/설정 탭 활성화 시 */
  .pane-left.mob-hidden  { display: none !important; }
  .pane-right.mob-active { display: flex !important; }

  /* 모바일에서 우측 탭바 숨김 (mob-tabs로 대체) */
  .right-tabs { display: none; }
  #tradesRefreshBtn { margin-left: auto; }

  .tbl-wrap { overflow-x: auto; overflow-y: auto; flex: 1; }
  table { font-size: 11px; min-width: 480px; }
  thead th { padding: 6px 6px; }
  td { padding: 5px 6px; }
}
</style>
</head>
<body>

<header>
  <span class="logo">📈 StockTrading</span>
  <span class="mode-grp">
    <span class="dot off" id="dotMock"></span>
    <span class="mode-lbl mock-lbl">MOCK</span>
    <span class="pid" id="pidMock"></span>
    <button class="btn-bot btn-start" id="btnStartMock" onclick="botStart('mock')">▶</button>
    <button class="btn-bot btn-stop"  id="btnStopMock"  onclick="botStop('mock')">■</button>
  </span>
  <span class="mode-grp">
    <span class="dot off" id="dotReal"></span>
    <span class="mode-lbl real-lbl">REAL</span>
    <span class="pid" id="pidReal"></span>
    <button class="btn-bot btn-start" id="btnStartReal" onclick="botStart('real')">▶</button>
    <button class="btn-bot btn-stop"  id="btnStopReal"  onclick="botStop('real')">■</button>
  </span>
  <div class="bot-controls">
    <button class="btn-bot btn-deploy" id="btnDeploy" onclick="botDeploy()">🚀 배포</button>
  </div>
  <span class="ts" id="lastTs" style="margin-left:8px"></span>
</header>

<div class="stats">
  <div class="stat">
    <span class="stat-lbl">전체</span>
    <span class="stat-val t" id="stTotal">—</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">매수</span>
    <span class="stat-val b" id="stBuys">—</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">매도</span>
    <span class="stat-val s" id="stSells">—</span>
  </div>
  <div class="stat" style="flex:1">
    <span class="stat-lbl">신호 분포</span>
    <span id="statSignals">—</span>
  </div>
  <div>
    <select id="modeSelect" onchange="onModeChange(this.value)"
      style="background:#1a1a1a;color:#aaa;border:1px solid #333;
             padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px;cursor:pointer">
      <option value="mock">Mock</option>
      <option value="real">Real</option>
    </select>
  </div>
</div>

<!-- 모바일 전용 탭 바 -->
<div class="mob-tabs">
  <button class="mob-tab active" id="mobTabLog"       onclick="switchMobTab('log')">📋 로그</button>
  <button class="mob-tab"        id="mobTabPortfolio" onclick="switchMobTab('portfolio')">📊 보유</button>
  <button class="mob-tab"        id="mobTabTrades"    onclick="switchMobTab('trades')">💼 거래내역</button>
  <button class="mob-tab"        id="mobTabSettings"  onclick="switchMobTab('settings')">⚙️ 설정</button>
</div>

<div class="body">
  <!-- 로그 패널 -->
  <div class="pane pane-left">
    <div class="pane-hd" style="padding: 0 14px 0 0;">
      <div class="log-tabs">
        <button class="log-tab active mock-active" id="tabMock" onclick="switchLogTab('mock')">
          <span class="tab-dot"></span>MOCK
        </button>
        <button class="log-tab" id="tabReal" onclick="switchLogTab('real')">
          <span class="tab-dot"></span>REAL
        </button>
      </div>
      <button class="btn-sm" id="asBtn" onclick="toggleAS()" style="margin-left: auto; padding-right: 4px;">자동스크롤 ON</button>
    </div>
    <div class="log-wrap" id="logMock"></div>
    <div class="log-wrap" id="logReal" style="display:none"></div>
  </div>

  <!-- 거래/설정 패널 -->
  <div class="pane pane-right">
    <div class="pane-hd" style="padding: 0 14px 0 0;">
      <div class="right-tabs">
        <button class="right-tab active" id="rtabPortfolio" onclick="switchRightTab('portfolio')">📊 포트폴리오</button>
        <button class="right-tab"        id="rtabTrades"    onclick="switchRightTab('trades')">💼 거래내역</button>
        <button class="right-tab"        id="rtabSettings"  onclick="switchRightTab('settings')">⚙️ 설정</button>
      </div>
      <button class="btn-sm" id="tradesRefreshBtn" onclick="refreshRight()" style="display:none">새로고침</button>
    </div>

    <!-- 포트폴리오 -->
    <div class="tbl-wrap" id="portfolioPanel">
      <table>
        <thead>
          <tr>
            <th>종목</th><th>수량</th><th>평균단가</th>
          </tr>
        </thead>
        <tbody id="pfBody"></tbody>
      </table>
    </div>

    <!-- 거래내역 -->
    <div class="tbl-wrap" id="tradesPanel" style="display:none">
      <table>
        <thead>
          <tr>
            <th>시각</th><th>구분</th><th>종목</th><th>수량</th><th>체결가</th><th>신호</th>
          </tr>
        </thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>

    <!-- 설정 -->
    <div class="settings-wrap" id="settingsPanel" style="display:none">
      <div class="cfg-section">
        <div class="cfg-title">스캔 주기</div>
        <div class="cfg-row">
          <input  type="number" id="cfgIntervalVal" class="cfg-input" min="1" max="9999" placeholder="주기">
          <select id="cfgUnit" class="cfg-select">
            <option value="1">분</option>
            <option value="60">시간</option>
            <option value="1440">일</option>
          </select>
          <button class="cfg-save" onclick="saveConfig()">저장</button>
        </div>
        <div class="cfg-hint">현재: <span id="cfgCurrent">—</span></div>
        <div class="cfg-hint" style="color:#444">0 입력 시 고정 시간(국내 09:05 / 나스닥 23:35)으로 동작</div>
        <div class="cfg-msg" id="cfgMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
let autoScroll  = true;
let activeLogTab = 'mock';
let currentMode  = 'mock';   // 거래내역 탭 모드
let spinning     = { mock: false, real: false };
let botStatus    = { mock: { running: false, pid: null }, real: { running: false, pid: null } };

// ── 자동스크롤 ─────────────────────────────────────
function toggleAS() {
  autoScroll = !autoScroll;
  document.getElementById('asBtn').textContent = '자동스크롤 ' + (autoScroll ? 'ON' : 'OFF');
}

// ── 거래내역 모드 전환 ──────────────────────────────
function onModeChange(v) {
  currentMode = v;
  loadTrades();
  loadSummary();
  loadPortfolio();
}

// ── 버튼 상태 (mock/real 각각 독립) ──────────────────
function setButtons() {
  ['mock', 'real'].forEach(m => {
    const run = botStatus[m].running;
    const sp  = spinning[m];
    const suffix = m[0].toUpperCase() + m.slice(1);
    const bs = document.getElementById('btnStart' + suffix);
    const bx = document.getElementById('btnStop'  + suffix);
    if (!bs || !bx) return;
    bs.disabled = run || sp;
    bx.disabled = !run || sp;
    bs.classList.toggle('btn-spin', sp && !run);
    bx.classList.toggle('btn-spin', sp && run);
  });
  const anySpin = spinning.mock || spinning.real;
  const bd = document.getElementById('btnDeploy');
  bd.disabled = anySpin;
  bd.classList.toggle('btn-spin', anySpin);
  bd.textContent = anySpin ? '🚀 배포 중' : '🚀 배포';
}

// ── 봇 제어 ────────────────────────────────────────
function _post(url, mode) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode }),
  }).then(r => r.json());
}

function botStart(mode) {
  spinning[mode] = true; setButtons();
  appendLog(mode, `[대시보드] ${mode.toUpperCase()} 봇 시작 요청...`);
  _post('/api/bot/start', mode)
    .then(d => {
      appendLog(mode, d.ok ? `[대시보드] ${mode.toUpperCase()} 봇 시작됨 (PID ${d.pid})` : `[대시보드] 시작 실패: ${d.error||''}`);
      spinning[mode] = false; loadStatus();
    })
    .catch(e => { appendLog(mode, '오류: ' + e); spinning[mode] = false; setButtons(); });
}

function botStop(mode) {
  spinning[mode] = true; setButtons();
  appendLog(mode, `[대시보드] ${mode.toUpperCase()} 봇 정지 요청...`);
  _post('/api/bot/stop', mode)
    .then(d => {
      appendLog(mode, d.ok ? `[대시보드] ${mode.toUpperCase()} 봇 정지됨` : `[대시보드] 정지 실패: ${d.error||''}`);
      spinning[mode] = false; loadStatus();
    })
    .catch(e => { appendLog(mode, '오류: ' + e); spinning[mode] = false; setButtons(); });
}

function botDeploy() {
  const mode = activeLogTab;
  spinning[mode] = true; setButtons();
  appendLog(mode, '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  appendLog(mode, `[deploy] ${mode.toUpperCase()} — git pull → 재시작...`);
  _post('/api/bot/deploy', mode)
    .then(d => {
      (d.lines || []).forEach(l => appendLog(mode, l));
      appendLog(mode, d.ok ? `✅ ${mode.toUpperCase()} 배포 완료` : `❌ 배포 실패: ${d.error||''}`);
      appendLog(mode, '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      spinning[mode] = false; loadStatus(); loadTrades(); loadSummary();
    })
    .catch(e => { appendLog(mode, '오류: ' + e); spinning[mode] = false; setButtons(); });
}

// ── 상태 ──────────────────────────────────────────
function loadStatus() {
  fetch('/api/status').then(r => r.json()).then(d => {
    botStatus = d;
    ['mock','real'].forEach(m => {
      const on = d[m].running;
      const pid = d[m].pid;
      document.getElementById('dot' + m[0].toUpperCase() + m.slice(1)).className = 'dot ' + (on ? 'on' : 'off');
      document.getElementById('pid' + m[0].toUpperCase() + m.slice(1)).textContent = pid ? 'PID ' + pid : '';
      // 로그 탭 dot
      const tab = document.getElementById('tab' + m[0].toUpperCase() + m.slice(1));
      const dot = tab.querySelector('.tab-dot');
      if (m === 'mock') {
        dot.style.background  = on ? '#a78bfa' : '#333';
        dot.style.boxShadow   = on ? '0 0 5px #a78bfa88' : 'none';
      } else {
        dot.style.background  = on ? '#22c55e' : '#333';
        dot.style.boxShadow   = on ? '0 0 5px #22c55e88' : 'none';
      }
    });
    document.getElementById('lastTs').textContent = new Date().toLocaleTimeString('ko-KR');
    setButtons();
  }).catch(() => {});
}

// ── 통계 ──────────────────────────────────────────
function loadSummary() {
  fetch('/api/trades/summary?mode=' + currentMode).then(r => r.json()).then(d => {
    document.getElementById('stTotal').textContent = d.total;
    document.getElementById('stBuys').textContent  = d.buys;
    document.getElementById('stSells').textContent = d.sells;
    const sigs = Object.entries(d.by_signal)
      .sort((a,b) => b[1]-a[1])
      .map(([k,v]) => k+' '+v+'건').join('  ·  ');
    document.getElementById('statSignals').textContent = sigs || '—';
  }).catch(() => {});
}

// ── 거래내역 ───────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return String(d.getMonth()+1).padStart(2,'0') + '/' +
         String(d.getDate()).padStart(2,'0') + ' ' +
         String(d.getHours()).padStart(2,'0') + ':' +
         String(d.getMinutes()).padStart(2,'0');
}
function fmtPrice(p, code) {
  if (!p) return '—';
  const n = parseFloat(p);
  if (isNaN(n)) return p;
  return /^[A-Z]{1,5}$/.test(code) ? '$'+n.toFixed(2) : n.toLocaleString('ko-KR')+'원';
}
function sigClass(s) {
  if (!s) return 'sg-def';
  if (s.includes('골든')) return 'sg-gc';
  if (s.includes('손절')) return 'sg-sl';
  if (s.includes('익절')) return 'sg-tp';
  if (s.includes('데드')) return 'sg-dc';
  return 'sg-def';
}
function loadTrades() {
  fetch('/api/trades?mode=' + currentMode).then(r => r.json()).then(records => {
    const tb = document.getElementById('tBody');
    tb.innerHTML = '';
    records.forEach(r => {
      const isBuy = r.action === 'BUY';
      const nameMain = r.stock_name
        ? `<span style="font-size:13px;color:#e0e0e0;font-weight:bold">${r.stock_name}</span>`
        : `<span style="font-size:13px;color:#60a5fa;font-weight:bold">${r.stock_code}</span>`;
      const codeSub = r.stock_name ? `<br><span style="color:#444;font-size:10px">${r.stock_code}</span>` : '';
      const profit  = r.profit_rate_pct != null
        ? `<span style="color:${r.profit_rate_pct>=0?'#22c55e':'#ef4444'};font-size:10px;margin-left:4px">${r.profit_rate_pct>=0?'+':''}${r.profit_rate_pct.toFixed(2)}%</span>` : '';
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td style="color:#444">${fmtTime(r.timestamp)}</td>` +
        `<td class="${isBuy?'ab':'as'}">${isBuy?'▲':'▼'} ${r.action}</td>` +
        `<td>${nameMain}${codeSub}</td>` +
        `<td>${r.quantity}</td>` +
        `<td>${fmtPrice(r.exec_price, r.stock_code)}${profit}</td>` +
        `<td><span class="sig ${sigClass(r.signal_type)}">${r.signal_type||'—'}</span></td>`;
      tb.appendChild(tr);
    });
  }).catch(() => {});
}

// ── 로그 탭 ───────────────────────────────────────
function switchLogTab(mode) {
  activeLogTab = mode;
  document.getElementById('logMock').style.display = mode==='mock' ? '' : 'none';
  document.getElementById('logReal').style.display = mode==='real' ? '' : 'none';
  document.getElementById('tabMock').className = 'log-tab' + (mode==='mock' ? ' active mock-active' : '');
  document.getElementById('tabReal').className = 'log-tab' + (mode==='real' ? ' active real-active' : '');
  setButtons();
  if (autoScroll) {
    const w = document.getElementById(mode==='mock' ? 'logMock' : 'logReal');
    w.scrollTop = w.scrollHeight;
  }
  // selectbox 동기화 + 데이터 새로고침
  currentMode = mode;
  document.getElementById('modeSelect').value = mode;
  loadTrades();
  loadSummary();
  loadPortfolio();
}

function appendLog(mode, line) {
  const wrap = document.getElementById(mode==='mock' ? 'logMock' : 'logReal');
  const d = document.createElement('div');
  d.className = 'll';
  let lvl = 'INFO';
  if (line.includes('[ERROR]')) lvl = 'ERROR';
  else if (line.includes('[WARNING]') || line.includes('[WARN]')) lvl = 'WARNING';
  else if (line.includes('[DEBUG]')) lvl = 'DEBUG';
  d.classList.add(lvl);
  d.innerHTML = line
    .replace(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+)/, '<span class="ts2">$1</span>')
    .replace(/(매수 완료|체결 완료|골든크로스|BUY)/g, '<span class="kw-b">$1</span>')
    .replace(/(매도 완료|손절 매도|익절 매도|SELL)/g, '<span class="kw-s">$1</span>');
  wrap.appendChild(d);
  while (wrap.children.length > 600) wrap.removeChild(wrap.firstChild);
  if (autoScroll && activeLogTab === mode) wrap.scrollTop = wrap.scrollHeight;
}

function makeEventSource(mode) {
  const es = new EventSource(`/stream/logs?mode=${mode}`);
  es.onmessage = e => { try { appendLog(mode, JSON.parse(e.data)); } catch(_) {} };
  es.onerror   = () => appendLog(mode, `[${mode.toUpperCase()}] 스트림 연결 끊김 — 재연결 중...`);
}

// ── 우측 패널 탭 (데스크톱) ───────────────────────
let activeRightTab = 'portfolio';

function switchRightTab(tab) {
  activeRightTab = tab;
  document.getElementById('portfolioPanel').style.display = tab === 'portfolio' ? '' : 'none';
  document.getElementById('tradesPanel').style.display    = tab === 'trades'    ? '' : 'none';
  document.getElementById('settingsPanel').style.display  = tab === 'settings'  ? '' : 'none';
  document.getElementById('tradesRefreshBtn').style.display = (tab === 'portfolio' || tab === 'trades') ? '' : 'none';
  document.getElementById('rtabPortfolio').classList.toggle('active', tab === 'portfolio');
  document.getElementById('rtabTrades').classList.toggle('active',    tab === 'trades');
  document.getElementById('rtabSettings').classList.toggle('active',  tab === 'settings');
  if (tab === 'settings')  loadConfig();
  if (tab === 'portfolio') loadPortfolio();
  if (tab === 'trades')    loadTrades();
}

function refreshRight() {
  if (activeRightTab === 'portfolio') loadPortfolio();
  else if (activeRightTab === 'trades') loadTrades();
}

// ── 포트폴리오 ──────────────────────────────────────
function loadPortfolio() {
  fetch('/api/portfolio?mode=' + currentMode).then(r => r.json()).then(items => {
    const tb = document.getElementById('pfBody');
    tb.innerHTML = '';
    if (!items.length) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="3" style="color:#444;text-align:center;padding:20px">보유 종목 없음</td>';
      tb.appendChild(tr);
      return;
    }
    items.forEach(h => {
      const nameMain = h.name
        ? `<span style="font-size:13px;color:#e0e0e0;font-weight:bold">${h.name}</span><br><span style="color:#444;font-size:10px">${h.code}</span>`
        : `<span style="font-size:13px;color:#60a5fa;font-weight:bold">${h.code}</span>`;
      const isOverseas = /^[A-Z]{1,5}$/.test(h.code);
      const priceStr = isOverseas ? '$' + h.avg_price.toFixed(2) : h.avg_price.toLocaleString('ko-KR') + '원';
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${nameMain}</td>` +
        `<td style="color:#60a5fa;font-weight:bold">${h.qty}주</td>` +
        `<td style="color:#aaa">${priceStr}</td>`;
      tb.appendChild(tr);
    });
  }).catch(() => {});
}

// ── 설정 ──────────────────────────────────────────
function loadConfig() {
  fetch('/api/config').then(r => r.json()).then(d => {
    const mins = d.scan_interval_minutes || 0;
    let label;
    if (mins === 0) {
      document.getElementById('cfgIntervalVal').value = '';
      document.getElementById('cfgUnit').value = '1';
      label = '고정 시간 (국내 09:05 / 나스닥 23:35)';
    } else if (mins % 1440 === 0) {
      document.getElementById('cfgIntervalVal').value = mins / 1440;
      document.getElementById('cfgUnit').value = '1440';
      label = `${mins / 1440}일마다`;
    } else if (mins % 60 === 0) {
      document.getElementById('cfgIntervalVal').value = mins / 60;
      document.getElementById('cfgUnit').value = '60';
      label = `${mins / 60}시간마다`;
    } else {
      document.getElementById('cfgIntervalVal').value = mins;
      document.getElementById('cfgUnit').value = '1';
      label = `${mins}분마다`;
    }
    document.getElementById('cfgCurrent').textContent = label;
  }).catch(() => {});
}

function saveConfig() {
  const raw  = parseInt(document.getElementById('cfgIntervalVal').value) || 0;
  const unit = parseInt(document.getElementById('cfgUnit').value);
  const mins = raw * unit;
  const msg  = document.getElementById('cfgMsg');
  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ scan_interval_minutes: mins }),
  }).then(r => r.json()).then(d => {
    if (d.ok) {
      msg.className = 'cfg-msg ok';
      msg.textContent = '저장됨 — 봇 재시작 시 적용됩니다';
      loadConfig();
    } else {
      msg.className = 'cfg-msg err';
      msg.textContent = d.error || '저장 실패';
    }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }).catch(() => { msg.className = 'cfg-msg err'; msg.textContent = '서버 오류'; });
}

// ── 모바일 탭 ──────────────────────────────────────
function switchMobTab(tab) {
  const logPane    = document.querySelector('.pane-left');
  const tradesPane = document.querySelector('.pane-right');
  ['mobTabLog','mobTabPortfolio','mobTabTrades','mobTabSettings'].forEach(id =>
    document.getElementById(id).classList.remove('active'));

  if (tab === 'log') {
    logPane.classList.remove('mob-hidden');
    tradesPane.classList.remove('mob-active');
    document.getElementById('mobTabLog').classList.add('active');
  } else {
    logPane.classList.add('mob-hidden');
    tradesPane.classList.add('mob-active');
    document.getElementById('mobTabPortfolio').classList.toggle('active', tab === 'portfolio');
    document.getElementById('mobTabTrades').classList.toggle('active',    tab === 'trades');
    document.getElementById('mobTabSettings').classList.toggle('active',  tab === 'settings');
    document.getElementById('portfolioPanel').style.display = tab === 'portfolio' ? '' : 'none';
    document.getElementById('tradesPanel').style.display    = tab === 'trades'    ? '' : 'none';
    document.getElementById('settingsPanel').style.display  = tab === 'settings'  ? '' : 'none';
    document.getElementById('tradesRefreshBtn').style.display = (tab === 'portfolio' || tab === 'trades') ? '' : 'none';
    if (tab === 'portfolio') loadPortfolio();
    if (tab === 'trades')    loadTrades();
    if (tab === 'settings')  loadConfig();
  }
}

// ── Init ──────────────────────────────────────────
makeEventSource('mock');
makeEventSource('real');
loadStatus();
loadPortfolio();
loadTrades();
loadSummary();
loadConfig();
setInterval(loadStatus,    5000);
setInterval(loadPortfolio, 30000);
setInterval(loadTrades,    30000);
setInterval(loadSummary,   30000);
</script>
