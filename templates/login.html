<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockTrading — 로그인</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', 'Menlo', monospace;
  background: #0a0a0a;
  color: #d4d4d4;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #141414;
  border: 1px solid #252525;
  border-radius: 10px;
  padding: 36px 40px 32px;
  width: 340px;
}
.logo {
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  text-align: center;
  margin-bottom: 28px;
  letter-spacing: -0.5px;
}
.section-title {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
}
.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 11px;
  color: #666;
  margin-bottom: 5px;
}
.field input {
  width: 100%;
  padding: 8px 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 5px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: #3b82f6; }
.btn-login {
  width: 100%;
  padding: 9px;
  background: #1d4ed8;
  color: #fff;
  border: none;
  border-radius: 5px;
  font-family: inherit;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.15s;
}
.btn-login:hover { background: #2563eb; }
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 20px 0 16px;
  color: #333;
  font-size: 11px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  border-top: 1px solid #252525;
}
.btn-guest {
  width: 100%;
  padding: 8px;
  background: #1a1a1a;
  color: #666;
  border: 1px solid #2a2a2a;
  border-radius: 5px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-guest:hover { border-color: #444; color: #999; }
.error {
  background: #2d1414;
  border: 1px solid #4a2020;
  color: #f87171;
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 4px;
  margin-bottom: 14px;
}
.guest-note {
  font-size: 10px;
  color: #444;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📈 StockTrading</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <div class="section-title">관리자 로그인</div>
  <form method="post" action="/login">
    <div class="field">
      <label>아이디</label>
      <input type="text" name="username" autocomplete="username" autofocus placeholder="admin">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button type="submit" class="btn-login">로그인</button>
  </form>

  <div class="divider">또는</div>

  <form method="post" action="/login">
    <button type="submit" name="guest" value="1" class="btn-guest">👁 게스트로 보기 (읽기 전용)</button>
  </form>
  <div class="guest-note">게스트는 봇 제어 및 설정 변경이 불가합니다</div>
</div>
</body>
</html>
